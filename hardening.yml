---
- name: Windows Server Hardening
  hosts: all
  gather_facts: yes

  collections:
    - ansible.windows

  vars:
    admin_new_name: LocalAdmin

  tasks:

    ####################################################################
    # Enable Windows Firewall
    ####################################################################

    - name: Enable Windows Firewall
      win_firewall:
        profiles:
          - Domain
          - Private
          - Public
        state: enabled

    ####################################################################
    # Disable Guest Account
    ####################################################################

    - name: Disable Guest account
      win_user:
        name: Guest
        account_disabled: yes

    ####################################################################
    # Rename Administrator Account
    ####################################################################

    - name: Rename local Administrator account
      win_shell: |
        $user = Get-LocalUser -Name "Administrator" -ErrorAction SilentlyContinue
        if ($user) {
          Rename-LocalUser -Name "Administrator" -NewName "{{ admin_new_name }}"
        }
      failed_when: false

    ####################################################################
    # Password Policy
    ####################################################################

    - name: Set minimum password length
      win_shell: net accounts /minpwlen:14

    - name: Set maximum password age
      win_shell: net accounts /maxpwage:60

    - name: Set minimum password age
      win_shell: net accounts /minpwage:1

    - name: Set password history
      win_shell: net accounts /uniquepw:24

    ####################################################################
    # Account Lockout Policy
    ####################################################################

    - name: Set lockout threshold
      win_shell: net accounts /lockoutthreshold:5

    - name: Set lockout duration
      win_shell: net accounts /lockoutduration:30

    - name: Set lockout observation window
      win_shell: net accounts /lockoutwindow:30

    ####################################################################
    # Disable SMBv1
    ####################################################################

    - name: Disable SMBv1
      win_shell: |
        Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart
      failed_when: false

    ####################################################################
    # Disable Remote Registry
    ####################################################################

    - name: Disable Remote Registry
      win_service:
        name: RemoteRegistry
        state: stopped
        start_mode: disabled

    ####################################################################
    # Disable Print Spooler (optional)
    ####################################################################

    - name: Disable Print Spooler
      win_service:
        name: Spooler
        state: stopped
        start_mode: disabled

    ####################################################################
    # Remove Telnet Client
    ####################################################################

    - name: Remove Telnet Client
      win_shell: |
        Disable-WindowsOptionalFeature -Online -FeatureName TelnetClient -NoRestart
      failed_when: false

    ####################################################################
    # Enable Windows Defender
    ####################################################################

    - name: Enable Microsoft Defender
      win_shell: |
        Set-MpPreference -DisableRealtimeMonitoring $false
      failed_when: false

    ####################################################################
    # Enable PowerShell Script Block Logging
    ####################################################################

    - name: Enable Script Block Logging
      win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
        name: EnableScriptBlockLogging
        data: 1
        type: dword

    ####################################################################
    # Enable PowerShell Module Logging
    ####################################################################

    - name: Enable Module Logging
      win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging
        name: EnableModuleLogging
        data: 1
        type: dword

    ####################################################################
    # Disable AutoRun
    ####################################################################

    - name: Disable AutoRun
      win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
        name: NoDriveTypeAutoRun
        data: 255
        type: dword

    ####################################################################
    # Disable LM Hash Storage
    ####################################################################

    - name: Disable LM Hash Storage
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: NoLMHash
        data: 1
        type: dword

    ####################################################################
    # Restrict Anonymous Enumeration
    ####################################################################

    - name: Restrict Anonymous SAM Enumeration
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: RestrictAnonymousSAM
        data: 1
        type: dword

    ####################################################################
    # Enable Audit Policies
    ####################################################################

    - name: Enable Audit Logon Success
      win_shell: auditpol /set /subcategory:"Logon" /success:enable

    - name: Enable Audit Logon Failure
      win_shell: auditpol /set /subcategory:"Logon" /failure:enable

    ####################################################################
    # Enable Network Level Authentication
    ####################################################################

    - name: Enable RDP Network Level Authentication
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
        name: UserAuthentication
        data: 1
        type: dword

    ####################################################################
    # Disable SSL 2.0
    ####################################################################

    - name: Disable SSL 2.0
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SSL 2.0\Server
        name: Enabled
        data: 0
        type: dword

    ####################################################################
    # Disable SSL 3.0
    ####################################################################

    - name: Disable SSL 3.0
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SSL 3.0\Server
        name: Enabled
        data: 0
        type: dword

    ####################################################################
    # Enable TLS 1.2
    ####################################################################

    - name: Enable TLS 1.2
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.2\Server
        name: Enabled
        data: 1
        type: dword

    ####################################################################
    # Disable SMB Guest Access
    ####################################################################

    - name: Disable SMB Guest Access
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
        name: AllowInsecureGuestAuth
        data: 0
        type: dword

    ####################################################################
    # Reboot
    ####################################################################

    - name: Reboot server
      win_reboot:
        reboot_timeout: 1800
