---
- name: Windows Server Hardening
  hosts: all
  gather_facts: yes

  vars:
    password_length: 14
    password_age: 60
    lockout_threshold: 5
    lockout_duration: 30
    admin_new_name: LocalAdmin

  tasks:

    ####################################################################
    # Enable Windows Firewall
    ####################################################################

    - name: Enable Windows Firewall on all profiles
      ansible.windows.win_firewall:
        profiles:
          - Domain
          - Private
          - Public
        state: enabled

    ####################################################################
    # Disable Guest Account
    ####################################################################

    - name: Disable Guest account
      ansible.windows.win_user:
        name: Guest
        account_disabled: yes

    ####################################################################
    # Rename Local Administrator
    ####################################################################

    - name: Rename Administrator account
      ansible.windows.win_shell: |
        if (Get-LocalUser -Name "Administrator" -ErrorAction SilentlyContinue) {
          Rename-LocalUser -Name "Administrator" -NewName "{{ admin_new_name }}"
        }
      register: rename_admin
      failed_when: false
      changed_when: rename_admin.rc == 0

    ####################################################################
    # Password Policy
    ####################################################################

    - name: Set minimum password length
      ansible.windows.win_security_policy:
        section: System Access
        key: MinimumPasswordLength
        value: "{{ password_length }}"

    - name: Set maximum password age
      ansible.windows.win_security_policy:
        section: System Access
        key: MaximumPasswordAge
        value: "{{ password_age }}"

    ####################################################################
    # Account Lockout Policy
    ####################################################################

    - name: Configure account lockout threshold
      ansible.windows.win_security_policy:
        section: System Access
        key: LockoutBadCount
        value: "{{ lockout_threshold }}"

    - name: Configure account lockout duration
      ansible.windows.win_security_policy:
        section: System Access
        key: LockoutDuration
        value: "{{ lockout_duration }}"

    ####################################################################
    # Disable SMBv1
    ####################################################################

    - name: Remove SMBv1 Feature
      ansible.windows.win_feature:
        name: FS-SMB1
        state: absent

    ####################################################################
    # Disable Remote Registry
    ####################################################################

    - name: Disable Remote Registry Service
      ansible.windows.win_service:
        name: RemoteRegistry
        state: stopped
        start_mode: disabled

    ####################################################################
    # Remove Telnet Client
    ####################################################################

    - name: Remove Telnet Client
      ansible.windows.win_feature:
        name: Telnet-Client
        state: absent

    ####################################################################
    # Enable Microsoft Defender
    ####################################################################

    - name: Enable Microsoft Defender Real-Time Protection
      ansible.windows.win_shell: |
        Set-MpPreference -DisableRealtimeMonitoring $false

    ####################################################################
    # Enable PowerShell Script Block Logging
    ####################################################################

    - name: Enable Script Block Logging
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
        name: EnableScriptBlockLogging
        data: 1
        type: dword

    ####################################################################
    # Enable PowerShell Module Logging
    ####################################################################

    - name: Enable Module Logging
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging
        name: EnableModuleLogging
        data: 1
        type: dword

    ####################################################################
    # Disable AutoRun
    ####################################################################

    - name: Disable AutoRun
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
        name: NoDriveTypeAutoRun
        data: 255
        type: dword

    ####################################################################
    # Disable LM Hash Storage
    ####################################################################

    - name: Disable LM Hash Storage
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: NoLMHash
        data: 1
        type: dword

    ####################################################################
    # Restrict Anonymous Enumeration
    ####################################################################

    - name: Restrict Anonymous SID Enumeration
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: RestrictAnonymousSAM
        data: 1
        type: dword

    ####################################################################
    # Enable Audit Policies
    ####################################################################

    - name: Enable Logon Success Auditing
      ansible.windows.win_shell: |
        auditpol /set /subcategory:"Logon" /success:enable

    - name: Enable Logon Failure Auditing
      ansible.windows.win_shell: |
        auditpol /set /subcategory:"Logon" /failure:enable

    ####################################################################
    # Enable RDP Network Level Authentication
    ####################################################################

    - name: Enable Network Level Authentication
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
        name: UserAuthentication
        data: 1
        type: dword

    ####################################################################
    # Disable SSL 2.0
    ####################################################################

    - name: Disable SSL 2.0
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SSL 2.0\Server
        name: Enabled
        data: 0
        type: dword

    ####################################################################
    # Disable SSL 3.0
    ####################################################################

    - name: Disable SSL 3.0
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\SSL 3.0\Server
        name: Enabled
        data: 0
        type: dword

    ####################################################################
    # Enable TLS 1.2
    ####################################################################

    - name: Enable TLS 1.2
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.2\Server
        name: Enabled
        data: 1
        type: dword

    ####################################################################
    # Reboot if Required
    ####################################################################

    - name: Reboot Windows server
      ansible.windows.win_reboot:
        reboot_timeout: 1800
